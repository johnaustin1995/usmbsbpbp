<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Southern Miss Live Dashboard 16x9</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/usm-live-169.css?v=20260224x" />
  </head>
  <body>
    <main class="layout-169">
      <header class="scoreboard-169">
        <div class="score-main-row">
          <div class="team-side away">
            <img id="away-logo" class="team-logo" alt="Away team logo" hidden />
            <p id="away-score" class="team-score">0</p>
          </div>

          <div class="center-game-state">
            <div class="inning-display" aria-label="Inning">
              <span id="inning-arrow" class="inning-arrow">▼</span>
              <span id="inning-value" class="inning-value">1</span>
            </div>

            <div class="bases-diamond" aria-label="Base state">
              <span id="base-second" class="base-cell base-second"></span>
              <span id="base-third" class="base-cell base-third"></span>
              <span id="base-first" class="base-cell base-first"></span>
            </div>

            <div class="count-outs" aria-label="Count and outs">
              <p id="count-status" class="count-status">0-0</p>
              <div id="outs-status" class="outs-status"></div>
            </div>
          </div>

          <div class="team-side home">
            <p id="home-score" class="team-score">0</p>
            <img id="home-logo" class="team-logo" alt="Home team logo" hidden />
          </div>
        </div>

        <div class="strip-row">
          <p id="away-strip" class="team-strip away-strip">PITCHER ---   P --</p>
          <p id="home-strip" class="team-strip home-strip">BATTER --- (.000)</p>
        </div>
      </header>

      <section class="body-grid">
        <aside class="side-column left-column">
          <h2 class="column-title">PITCHING</h2>

          <section class="hero-card">
            <div class="hero-photo-wrap">
              <img id="pitcher-photo" class="hero-photo" alt="Pitcher photo" />
              <span id="pitcher-number" class="hero-number">--</span>
            </div>
            <div class="hero-content">
              <p id="pitcher-name" class="hero-name">-</p>
              <p id="pitcher-meta" class="hero-meta">-</p>
            </div>
          </section>

          <section class="stats-card">
            <p class="stats-title">THIS GAME</p>
            <table id="pitcher-stats" class="stat-table"></table>
          </section>

          <section class="field-card">
            <svg viewBox="0 0 640 440" preserveAspectRatio="xMidYMid meet" class="field-svg" aria-label="Defensive alignment">
              <defs>
                <linearGradient id="grassGradient169" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#1f9d48" />
                  <stop offset="100%" stop-color="#16773a" />
                </linearGradient>
              </defs>
              <path d="M320 420 L36 162 Q320 -88 604 162 Z" fill="url(#grassGradient169)" stroke="#cd8356" stroke-width="10" />
              <path d="M320 382 L162 226 Q320 114 478 226 Z" fill="#c8875d" stroke="#dfab87" stroke-width="5" />
              <line x1="96" y1="166" x2="320" y2="388" stroke="#ffffff" stroke-width="4" />
              <line x1="544" y1="166" x2="320" y2="388" stroke="#ffffff" stroke-width="4" />
              <rect x="311" y="376" width="18" height="18" fill="#fff8e9" transform="rotate(45 320 385)" />
              <rect x="229" y="292" width="16" height="16" fill="#fff8e9" transform="rotate(45 237 300)" />
              <rect x="395" y="292" width="16" height="16" fill="#fff8e9" transform="rotate(45 403 300)" />
              <rect x="312" y="212" width="16" height="16" fill="#fff8e9" transform="rotate(45 320 220)" />
            </svg>

            <div id="field-labels" class="field-labels">
              <span data-pos="lf">LF</span>
              <span data-pos="cf">CF</span>
              <span data-pos="rf">RF</span>
              <span data-pos="ss">SS</span>
              <span data-pos="2b">2B</span>
              <span data-pos="3b">3B</span>
              <span data-pos="1b">1B</span>
              <span data-pos="p">P</span>
              <span data-pos="c">C</span>
            </div>
          </section>
        </aside>

        <section class="center-column">
          <section id="linescore-wrap" class="linescore-wrap"></section>
          <section id="timeline" class="timeline"></section>
        </section>

        <aside class="side-column right-column">
          <h2 class="column-title">HITTING</h2>

          <section class="hero-card">
            <div class="hero-photo-wrap">
              <img id="batter-photo" class="hero-photo" alt="Batter photo" />
              <span id="batter-number" class="hero-number">--</span>
            </div>
            <div class="hero-content">
              <p id="batter-name" class="hero-name">-</p>
              <p id="batter-meta" class="hero-meta">-</p>
            </div>
          </section>

          <section class="stats-card">
            <p class="stats-title">THIS SEASON</p>
            <table id="batter-stats" class="stat-table"></table>
          </section>

          <section class="runners-card">
            <p class="runners-title">BASERUNNERS</p>
            <div class="runner-heads">
              <span>1B</span>
              <span>2B</span>
              <span>3B</span>
            </div>
            <div class="runner-values">
              <span id="runner-first">EMPTY</span>
              <span id="runner-second">EMPTY</span>
              <span id="runner-third">EMPTY</span>
            </div>
          </section>

          <section class="lineup-card">
            <table id="lineup-table" class="lineup-table"></table>
          </section>
        </aside>
      </section>
    </main>

    <script src="/branding.js?v=20260223a" defer></script>
    <script src="/usm-live-169.js?v=20260224z" defer></script>
  </body>
</html>
